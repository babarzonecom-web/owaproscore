<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 owaproscore デプロイツール</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, sans-serif;
  background: #0a0f1e; color: #e2e8f0;
  min-height: 100vh; display: flex;
  align-items: center; justify-content: center; padding: 20px;
}
.card {
  background: #0d1a2e; border: 1.5px solid #1e3a5f;
  border-radius: 16px; padding: 28px;
  width: 100%; max-width: 420px;
}
h1 { font-size: 20px; font-weight: 900; margin-bottom: 6px; }
.sub { font-size: 12px; color: #64748b; margin-bottom: 20px; }
label { font-size: 11px; color: #94a3b8; display: block; margin-bottom: 4px; }
input {
  width: 100%; padding: 10px 12px; border-radius: 8px;
  background: #060f1e; border: 1.5px solid #1e3a5f;
  color: #e2e8f0; font-size: 14px; outline: none; margin-bottom: 12px;
}
input:focus { border-color: #3b82f6; }
.btn {
  width: 100%; padding: 14px; border-radius: 10px; border: none;
  font-size: 15px; font-weight: 700; cursor: pointer;
  background: #238636; color: #fff; font-family: inherit;
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.progress { height: 4px; background: #1e3a5f; border-radius: 2px; margin: 12px 0; display: none; }
.progress.show { display: block; }
.fill { height: 100%; width: 0%; background: linear-gradient(90deg,#3b82f6,#22c55e); border-radius: 2px; transition: width 0.3s; }
.status { margin-top: 12px; padding: 12px; border-radius: 8px; font-size: 13px; line-height: 1.6; display: none; white-space: pre-wrap; }
.status.show { display: block; }
.ok  { background: #0d2a1a; border: 1px solid #22c55e; color: #4ade80; }
.err { background: #2a0a0a; border: 1px solid #f87171; color: #f87171; }
.ing { background: #0d1f35; border: 1px solid #3b82f6; color: #7dd3fc; }
.badge { display:inline-block; background:#1d4ed833; border:1px solid #3b82f6; border-radius:20px; padding:2px 10px; font-size:11px; color:#7dd3fc; margin-bottom:16px; }
</style>
</head>
<body>
<div class="card">
  <h1>🚀 owaproscore デプロイ</h1>
  <p class="sub">index.htmlをGitHub APIで直接プッシュします</p>
  <div class="badge">v202 ready</div>

  <label>オーナー名</label>
  <input id="owner" value="babarzonecom-web">

  <label>リポジトリ名</label>
  <input id="repo" value="owaproscore">

  <label>ブランチ</label>
  <input id="branch" value="main">

  <label>Personal Access Token（repo権限）</label>
  <input id="token" type="password" placeholder="ghp_xxxxxxxxxx">

  <button class="btn" id="btn" onclick="deploy()">🚀 GitHubにデプロイ</button>

  <div class="progress" id="prog"><div class="fill" id="fill"></div></div>
  <div class="status" id="status"></div>
</div>

<script>
function st(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg; el.className = 'status show ' + cls;
}
function prog(p) {
  document.getElementById('prog').className = 'progress show';
  document.getElementById('fill').style.width = p + '%';
}

async function deploy() {
  const owner  = document.getElementById('owner').value.trim();
  const repo   = document.getElementById('repo').value.trim();
  const branch = document.getElementById('branch').value.trim();
  const token  = document.getElementById('token').value.trim();
  if(!token) { st('❌ PATトークンを入力してください', 'err'); return; }

  const btn = document.getElementById('btn');
  btn.disabled = true;

  try {
    const base = `https://api.github.com/repos/${owner}/${repo}/contents/index.html`;
    const headers = {
      'Authorization': 'token ' + token,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json',
    };

    st('⏳ GitHubからSHAを取得中...', 'ing'); prog(20);
    const getRes = await fetch(`${base}?ref=${branch}`, { headers });
    const getData = await getRes.json();
    if(!getData.sha) { st('❌ SHA取得失敗: ' + (getData.message||'不明'), 'err'); btn.disabled=false; return; }

    st('⏳ index.htmlを読み込み中...', 'ing'); prog(40);
    // deploy-tool.htmlと同じフォルダのindex.htmlを取得
    const htmlUrl = location.href.replace(/deploy-tool\.html.*$/, 'index.html') + '?t=' + Date.now();
    const htmlRes = await fetch(htmlUrl);
    if(!htmlRes.ok) { st('❌ index.htmlの取得失敗\n同じフォルダに index.html があるか確認してください', 'err'); btn.disabled=false; return; }

    st('⏳ エンコード中...', 'ing'); prog(60);
    const text = await htmlRes.text();
    const bytes = new TextEncoder().encode(text);
    let bin = '';
    for(let i=0; i<bytes.length; i+=8192) bin += String.fromCharCode(...bytes.slice(i, i+8192));
    const b64 = btoa(bin);

    st('⏳ プッシュ中...', 'ing'); prog(80);
    const pushRes = await fetch(base, {
      method: 'PUT', headers,
      body: JSON.stringify({
        message: 'deploy: owaproscore ' + new Date().toLocaleString('ja-JP'),
        content: b64, sha: getData.sha, branch,
      }),
    });
    const pushData = await pushRes.json();
    prog(100);

    if(pushRes.ok) {
      st('✅ デプロイ完了！\n数十秒後にGitHub Pagesに反映されます', 'ok');
      localStorage.setItem('gh_token', token);
      localStorage.setItem('gh_owner', owner);
      localStorage.setItem('gh_repo', repo);
      localStorage.setItem('gh_branch', branch);
    } else {
      st('❌ ' + (pushData.message || pushRes.status), 'err');
    }
  } catch(e) { st('❌ ' + e.message, 'err'); }
  btn.disabled = false;
}

// 保存済み設定を復元
window.onload = () => {
  ['token','owner','repo','branch'].forEach(k => {
    const v = localStorage.getItem('gh_' + k);
    if(v) document.getElementById(k).value = v;
  });
};
</script>
</body>
</html>
