<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>React テスト</title>
<style>
body { background: #0a1628; color: white; font-size: 20px; padding: 30px; }
#log { margin-top: 20px; font-size: 14px; color: #94a3b8; }
</style>
</head>
<body>
<div id="msg">読み込み中...</div>
<div id="root"></div>
<div id="log"></div>

<script>
function log(msg) {
  document.getElementById('log').innerHTML += '<br>' + msg;
  document.getElementById('msg').textContent = msg;
}
log('Step1: JS開始');
</script>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"
  onload="log('Step2: React読込OK')"
  onerror="log('Step2: React読込失敗')">
</script>

<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
  onload="log('Step3: ReactDOM読込OK')"
  onerror="log('Step3: ReactDOM読込失敗')">
</script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"
  onload="log('Step4: Firebase App読込OK')"
  onerror="log('Step4: Firebase App読込失敗')">
</script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"
  onload="log('Step5: Firebase DB読込OK')"
  onerror="log('Step5: Firebase DB読込失敗')">
</script>

<script>
window.addEventListener('load', function() {
  log('Step6: 全読込完了');
  try {
    var root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement('div', {style:{color:'#22c55e',fontSize:24}}, '✅ React動作OK'));
    log('Step7: React描画OK');
  } catch(e) {
    log('Step7エラー: ' + e.message);
  }
});
</script>
</body>
</html>
